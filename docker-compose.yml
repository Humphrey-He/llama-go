services:
  go-server:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - python-backend
    environment:
      - BACKEND_URL=http://python-backend:8000

  python-backend:
    image: python:3.10
    working_dir: /app
    volumes:
      - ./models:/models
      - ./python:/app
    command: bash -c "pip install vllm -q && python -m vllm.entrypoints.openai.api_server --model /models/Dolphin3.0-Llama3.1-8B-Q4_K_S.gguf --port 8000"
    ports:
      - "8000:8000"