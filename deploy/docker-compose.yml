version: '3.8'

services:
  llama-backend:
    image: python:3.10
    container_name: llama-go-backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models
      - ./python:/app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/models/dolphin-3.0-llama-3.1-8b.Q4_K_M.gguf
    command: >
      bash -c "pip install vllm -q &&
      python -m vllm.entrypoints.openai.api_server
      --model /models/dolphin-3.0-llama-3.1-8b.Q4_K_M.gguf
      --port 8000
      --tensor-parallel-size 1
      --max-model-len 2048"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  llama-go:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llama-go-api
    ports:
      - "8080:8080"
    depends_on:
      llama-backend:
        condition: service_healthy
    environment:
      - BACKEND_URL=http://llama-backend:8000
      - LOG_LEVEL=info
      - METRICS_ENABLED=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: llama-go-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:latest
    container_name: llama-go-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
