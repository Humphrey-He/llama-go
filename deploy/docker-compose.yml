version: '3.8'

services:
  python-backend:
    image: python:3.10
    container_name: llama-go-python
    ports:
      - "8000:8000"
    volumes:
      - ./python:/app
    working_dir: /app
    command: python -m uvicorn inference_engine:app --host 0.0.0.0 --port 8000
    environment:
      - PYTHONUNBUFFERED=1

  llama-go:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llama-go-api
    ports:
      - "8080:8080"
    depends_on:
      - python-backend
    environment:
      - BACKEND_URL=http://python-backend:8000
      - LOG_LEVEL=info
      - METRICS_ENABLED=true
    volumes:
      - ./config.yaml:/etc/llama-go/config.yaml

  prometheus:
    image: prom/prometheus:latest
    container_name: llama-go-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:latest
    container_name: llama-go-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
