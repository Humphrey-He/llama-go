services:
  go-server:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - python-backend
    environment:
      - BACKEND_URL=http://python-backend:8000

  python-backend:
    image: python:3.10
    working_dir: /app
    volumes:
      - ./models:/models
      - ./python:/app
    command: python start_vllm.py
    ports:
      - "8000:8000"
    environment:
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - PYTHONUNBUFFERED=1