version: '3'
services:
  go-server:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - python-backend

  python-backend:
    image: python:3.10
    working_dir: /app
    volumes:
      - ./python:/app
      - ./requirements.txt:/app/requirements.txt
    command: bash -c "pip install -r requirements.txt && python kv_server.py"
    ports:
      - "8000:8000"