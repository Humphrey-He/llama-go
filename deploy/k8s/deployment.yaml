apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-go
  labels:
    app: llama-go
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llama-go
  template:
    metadata:
      labels:
        app: llama-go
    spec:
      containers:
      - name: llama-go
        image: llama-go:latest
        ports:
        - containerPort: 8080
        env:
        - name: BACKEND_URL
          valueFrom:
            configMapKeyRef:
              name: llama-go-config
              key: backend_url
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: llama-go-config
              key: log_level
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      terminationGracePeriodSeconds: 30
