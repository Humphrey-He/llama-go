# Llama-Go 配置文件

# 模型配置
model:
  path: "./models/llama-7b.gguf"  # 模型文件路径
  type: "llama"                    # 模型类型

# 推理参数
inference:
  context_size: 2048              # 上下文窗口大小
  max_tokens: 512                 # 最大生成 token 数
  temperature: 0.7                # 温度（0-1，越低越确定）
  top_p: 0.9                      # Top-P 采样
  top_k: 40                       # Top-K 采样
  repeat_penalty: 1.1             # 重复惩罚

# 服务配置
server:
  host: "0.0.0.0"
  port: 8080
  timeout: 30s

# 日志配置
logging:
  level: "info"                   # debug/info/warn/error
  format: "json"                  # json/text
